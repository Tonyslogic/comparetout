name: Android CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify Gradle version
      run: ./gradlew --version

    - name: Build with Gradle
      # assembleDebug builds every region flavor (ieDebug + gbDebug), so a
      # GB-breaking change fails CI even before GB ships.
      run: ./gradlew assembleDebug --stacktrace

    - name: Run unit tests
      # One flavor is enough for the JVM tests — the classes are identical
      # across regions (only BuildConfig.REGION differs).
      run: ./gradlew testIeDebugUnitTest --stacktrace

