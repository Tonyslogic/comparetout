name: Firebase Test Lab

# Manual-only for now. Add `push:` / `pull_request:` triggers later when
# the test suite is broader and FTL quota usage is well understood.
on:
  workflow_dispatch:
    inputs:
      device:
        description: 'FTL device model (default: MediumPhone.arm)'
        required: false
        default: 'MediumPhone.arm'
      version:
        description: 'API level'
        required: false
        default: '34'

# id-token: write is required for GitHub's OIDC provider to mint a token
# that the WIF exchange consumes. contents: read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

jobs:
  ftl:
    name: Smoke on FTL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build app + androidTest APKs
        # FTL smoke-tests the IE edition (region flavors share all code paths;
        # only BuildConfig.REGION differs).
        run: ./gradlew :app:assembleIeDebug :app:assembleIeDebugAndroidTest --stacktrace

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-ftl@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Run smoke test on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/ie/debug/app-ie-debug.apk \
            --test app/build/outputs/apk/androidTest/ie/debug/app-ie-debug-androidTest.apk \
            --device "model=${{ inputs.device }},version=${{ inputs.version }},locale=en,orientation=portrait" \
            --test-targets "class com.tfcode.comparetout.SmokeLaunchTest" \
            --results-bucket=comparetout-ftl-results \
            --timeout 5m \
            --num-flaky-test-attempts 1
