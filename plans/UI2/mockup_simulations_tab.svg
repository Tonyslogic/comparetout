<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <!-- Background -->
  <rect width="400" height="800" fill="#f5f5f5"/>

  <!-- App Bar -->
  <rect width="400" height="80" fill="#6200EE"/>
  <text x="20" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">Simulations</text>
  <!-- Menu dots -->
  <circle cx="360" cy="35" r="3" fill="white"/><circle cx="360" cy="45" r="3" fill="white"/><circle cx="360" cy="55" r="3" fill="white"/>

  <!-- Card 1 -->
  <rect x="20" y="100" width="360" height="150" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="130" font-family="sans-serif" font-size="20" font-weight="bold">PV + Battery</text>
  <rect x="40" y="145" width="100" height="24" rx="12" fill="#E3F2FD"/>
  <text x="50" y="162" font-family="sans-serif" font-size="12" fill="#1976D2">Supplier Sync</text>
  <text x="40" y="195" font-family="sans-serif" font-size="18" fill="#388E3C">€ 450 / year</text>

  <!-- Buttons -->
  <rect x="170" y="210" width="60" height="30" rx="5" fill="#EEEEEE"/><text x="183" y="230" font-family="sans-serif" font-size="14">View</text>
  <rect x="240" y="210" width="50" height="30" rx="5" fill="#EEEEEE"/><text x="250" y="230" font-family="sans-serif" font-size="14">Edit</text>
  <rect x="300" y="210" width="60" height="30" rx="5" fill="#FFEBEE"/><text x="312" y="230" font-family="sans-serif" font-size="14" fill="#D32F2F">Delete</text>

  <!-- Card 2 -->
  <rect x="20" y="270" width="360" height="150" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="300" font-family="sans-serif" font-size="20" font-weight="bold">Base Scenario</text>
  <rect x="40" y="315" width="120" height="24" rx="12" fill="#FFF3E0"/>
  <text x="50" y="332" font-family="sans-serif" font-size="12" fill="#F57C00">National Average</text>
  <text x="40" y="365" font-family="sans-serif" font-size="18" fill="#388E3C">€ 1,200 / year</text>

  <rect x="170" y="380" width="60" height="30" rx="5" fill="#EEEEEE"/><text x="183" y="400" font-family="sans-serif" font-size="14">View</text>
  <rect x="240" y="380" width="50" height="30" rx="5" fill="#EEEEEE"/><text x="250" y="400" font-family="sans-serif" font-size="14">Edit</text>
  <rect x="300" y="380" width="60" height="30" rx="5" fill="#FFEBEE"/><text x="312" y="400" font-family="sans-serif" font-size="14" fill="#D32F2F">Delete</text>

  <!-- Add Simulation FAB -->
  <circle cx="330" cy="640" r="30" fill="#03DAC6"/>
  <line x1="330" y1="625" x2="330" y2="655" stroke="white" stroke-width="4"/>
  <line x1="315" y1="640" x2="345" y2="640" stroke="white" stroke-width="4"/>

  <!-- Bottom Navigation -->
  <rect y="720" width="400" height="80" fill="white" stroke="#ccc"/>
  <text x="40" y="765" font-family="sans-serif" font-size="14" fill="#6200EE" font-weight="bold">Simulations</text>
  <text x="160" y="765" font-family="sans-serif" font-size="14" fill="#757575">Comparisons</text>
  <text x="290" y="765" font-family="sans-serif" font-size="14" fill="#757575">Directors</text>
</svg>