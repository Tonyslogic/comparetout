<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <!-- Background -->
  <rect width="400" height="800" fill="#f5f5f5"/>

  <!-- App Bar -->
  <rect width="400" height="80" fill="#6200EE"/>
  <text x="20" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">Comparisons</text>
  <circle cx="360" cy="35" r="3" fill="white"/><circle cx="360" cy="45" r="3" fill="white"/><circle cx="360" cy="55" r="3" fill="white"/>

  <!-- Toggle -->
  <rect x="20" y="100" width="360" height="40" rx="20" fill="#E0E0E0"/>
  <rect x="20" y="100" width="180" height="40" rx="20" fill="white" stroke="#ccc"/>
  <text x="40" y="125" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6200EE">Compare Sims</text>
  <text x="240" y="125" font-family="sans-serif" font-size="14" fill="#757575">Compare Plans</text>

  <!-- Chips -->
  <text x="20" y="170" font-family="sans-serif" font-size="14" font-weight="bold" fill="#424242">Select to Compare:</text>
  <rect x="20" y="185" width="120" height="30" rx="15" fill="#E3F2FD" stroke="#1976D2"/>
  <text x="35" y="205" font-family="sans-serif" font-size="12" fill="#1976D2">✓ PV + Battery</text>

  <rect x="150" y="185" width="130" height="30" rx="15" fill="#E3F2FD" stroke="#1976D2"/>
  <text x="165" y="205" font-family="sans-serif" font-size="12" fill="#1976D2">✓ Base Scenario</text>

  <rect x="290" y="185" width="80" height="30" rx="15" fill="white" stroke="#ccc"/>
  <text x="310" y="205" font-family="sans-serif" font-size="12" fill="#757575">+ Add</text>

  <!-- Chart Placeholder -->
  <rect x="20" y="240" width="360" height="230" rx="10" fill="white" stroke="#ccc"/>

  <!-- Embedding existing logic -->
  <text x="50" y="340" font-family="sans-serif" font-size="16" fill="#9E9E9E">[ Existing Comparison Graph UI ]</text>
  <text x="60" y="365" font-family="sans-serif" font-size="12" fill="#BDBDBD">(Reusing current filters, time &amp; dates)</text>

  <!-- Table Placeholder -->
  <rect x="20" y="490" width="360" height="150" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="520" font-family="sans-serif" font-size="16" font-weight="bold">Cost Summary</text>

  <line x1="20" y1="540" x2="380" y2="540" stroke="#eee"/>
  <text x="40" y="565" font-family="sans-serif" font-size="14">PV + Battery</text>
  <text x="280" y="565" font-family="sans-serif" font-size="14" font-weight="bold" fill="#388E3C">€ 450 / yr</text>

  <line x1="20" y1="580" x2="380" y2="580" stroke="#eee"/>
  <text x="40" y="605" font-family="sans-serif" font-size="14">Base Scenario</text>
  <text x="280" y="605" font-family="sans-serif" font-size="14" font-weight="bold" fill="#388E3C">€ 1,200 / yr</text>

  <!-- Bottom Navigation -->
  <rect y="720" width="400" height="80" fill="white" stroke="#ccc"/>
  <text x="40" y="765" font-family="sans-serif" font-size="14" fill="#757575">Simulations</text>
  <text x="160" y="765" font-family="sans-serif" font-size="14" fill="#6200EE" font-weight="bold">Comparisons</text>
  <text x="290" y="765" font-family="sans-serif" font-size="14" fill="#757575">Directors</text>
</svg>