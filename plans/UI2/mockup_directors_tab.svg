<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <!-- Background -->
  <rect width="400" height="800" fill="#f5f5f5"/>

  <!-- App Bar -->
  <rect width="400" height="80" fill="#6200EE"/>
  <text x="20" y="50" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">Directors</text>
  <circle cx="360" cy="35" r="3" fill="white"/><circle cx="360" cy="45" r="3" fill="white"/><circle cx="360" cy="55" r="3" fill="white"/>

  <!-- Section: Usage Data -->
  <text x="20" y="120" font-family="sans-serif" font-size="18" font-weight="bold" fill="#424242">Usage Data Sources</text>
  <rect x="20" y="140" width="360" height="80" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="170" font-family="sans-serif" font-size="16" font-weight="bold">2023 Smart Meter</text>
  <text x="40" y="195" font-family="sans-serif" font-size="12" fill="#757575">Supplier Sync • Linked to 2 sims</text>
  <!-- Graph Button -->
  <rect x="230" y="165" width="45" height="30" rx="5" fill="#E3F2FD"/><text x="238" y="185" font-family="sans-serif" font-size="14" fill="#1976D2">Graph</text>
  <!-- Link Button -->
  <rect x="280" y="165" width="80" height="30" rx="5" fill="#EEEEEE"/><text x="305" y="185" font-family="sans-serif" font-size="14" fill="#6200EE">Link</text>

  <!-- Section: Tariff Plans -->
  <text x="20" y="260" font-family="sans-serif" font-size="18" font-weight="bold" fill="#424242">Tariff Plans</text>

  <rect x="20" y="280" width="360" height="80" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="310" font-family="sans-serif" font-size="16" font-weight="bold">Night Boost Plan</text>
  <text x="40" y="335" font-family="sans-serif" font-size="12" fill="#757575">Smart Tariff • Linked to 1 sim</text>
  <rect x="280" y="305" width="80" height="30" rx="5" fill="#EEEEEE"/><text x="305" y="325" font-family="sans-serif" font-size="14" fill="#6200EE">Link</text>

  <rect x="20" y="370" width="360" height="80" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="400" font-family="sans-serif" font-size="16" font-weight="bold">Standard Flat Rate</text>
  <text x="40" y="425" font-family="sans-serif" font-size="12" fill="#757575">Flat Rate • Unlinked</text>
  <rect x="280" y="395" width="80" height="30" rx="5" fill="#EEEEEE"/><text x="305" y="415" font-family="sans-serif" font-size="14" fill="#6200EE">Link</text>

  <!-- Section: System Profiles -->
  <text x="20" y="490" font-family="sans-serif" font-size="18" font-weight="bold" fill="#424242">System Profiles</text>
  <rect x="20" y="510" width="360" height="80" rx="10" fill="white" stroke="#ccc"/>
  <text x="40" y="540" font-family="sans-serif" font-size="16" font-weight="bold">5kW Inverter + 10kWh Bat</text>
  <text x="40" y="565" font-family="sans-serif" font-size="12" fill="#757575">Hardware • Unlinked</text>
  <rect x="280" y="535" width="80" height="30" rx="5" fill="#EEEEEE"/><text x="305" y="555" font-family="sans-serif" font-size="14" fill="#6200EE">Link</text>

  <!-- Bottom Navigation -->
  <rect y="720" width="400" height="80" fill="white" stroke="#ccc"/>
  <text x="40" y="765" font-family="sans-serif" font-size="14" fill="#757575">Simulations</text>
  <text x="160" y="765" font-family="sans-serif" font-size="14" fill="#757575">Comparisons</text>
  <text x="290" y="765" font-family="sans-serif" font-size="14" fill="#6200EE" font-weight="bold">Directors</text>
</svg>